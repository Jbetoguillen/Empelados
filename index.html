<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard PRO – Programa de Capacitación</title>

<style>
  body { font-family:'Segoe UI', Arial; background:#eef1f4; margin:0; padding:20px; }
  h2 { color:#2d3e50; margin-bottom:20px; }
  table { width:100%; border-collapse:collapse; background:#fff; border-radius:12px; margin-top:20px; display:block; max-height:75vh; overflow-y:auto; }
  thead th { position: sticky; top: 0; background:#1f2d3d; color:white; z-index: 50; padding:10px; font-size:13px; }
  td { padding:10px; border-bottom:1px solid #ddd; text-align:center; vertical-align:middle; cursor:pointer; }
  .tag { padding:4px 8px; border-radius:10px; font-size:11px; font-weight:bold; color:#fff; }
  .rojo { background:#dc3545; }
  .amarillo { background:#ffc107; color:#000; }
  .verde { background:#28a745; }
  .alerta-fase { background:#f8f9fa; padding:6px; border-radius:6px; margin:2px 0; border-left:4px solid #dc3545; font-size:11px; text-align:left; }
  .fase-tag { padding:4px 8px; border-radius:6px; font-size:11px; font-weight:bold; color:white; display:inline-block; }
  .f1 { background:#dc3545; }
  .f2 { background:#ffc107; color:#000; }
  .f3 { background:#28a745; }

  /* MODAL */
  #modal {
    position:fixed; top:0; left:0; width:100%; height:100%;
    background:rgba(0,0,0,0.6); display:none; justify-content:center; align-items:center;
  }
  #modalContent {
    background:white; width:70%; padding:20px; border-radius:12px;
  }
  #closeBtn {
    float:right; cursor:pointer; font-size:20px; font-weight:bold;
  }
</style>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const DATA_TRABAJADORES = [
  { nombre:"Michel Adriana Castro", merma:2, limpieza:70, calidad:90, resistencia:60, tecnica:75, cajas:34, inicio:"2026-03-31" },
  { nombre:"María de los Ángeles Castillo Contreras", merma:3, limpieza:70, calidad:90, resistencia:50, tecnica:70, cajas:28, inicio:"2026-03-31" },
  { nombre:"Felipe de Jesús Castillo Escalante", merma:4, limpieza:85, calidad:80, resistencia:50, tecnica:65, cajas:35, inicio:"2026-03-31" },
  { nombre:"Blanca Yaneli Vega Gutierrez", merma:2, limpieza:75, calidad:90, resistencia:60, tecnica:75, cajas:30, inicio:"2026-04-03" },
  { nombre:"Cesar Braulio Pereida Monroy", merma:5, limpieza:60, calidad:70, resistencia:60, tecnica:70, cajas:29, inicio:"2026-04-04" },
  { nombre:"José Ángel González García", merma:4, limpieza:60, calidad:80, resistencia:40, tecnica:65, cajas:20, inicio:"2026-04-01" },
  { nombre:"Santos Heriberto Cornelio Tapia", merma:6, limpieza:60, calidad:70, resistencia:50, tecnica:65, cajas:25, inicio:"2026-04-01" }
];

function calcularAvance(inicio) {
  const start = new Date(inicio);
  const hoy = new Date("2026-04-06");
  const diff = Math.floor((hoy - start) / (1000*60*60*24));
  const avance = Math.min(Math.max(Math.round((diff/33)*100), 0), 100);
  return { avance, dias: diff };
}

function barraAvance(p) {
  let color = "#28a745"; if (p < 40) color = "#dc3545"; else if (p < 70) color = "#ffc107";
  return `<div style="width:100%; background:#eee; border-radius:6px;">
            <div style="width:${p}%; background:${color}; color:#000; padding:3px; border-radius:6px; font-size:11px; text-align:center; font-weight:bold;">
              ${p}%
            </div>
          </div>`;
}

function miniGraficoInventario(cajas) {
  const max = 45;
  const bloques = Math.round((cajas / max) * 10);
  const barra = "▮".repeat(bloques) + "▯".repeat(10 - bloques);
  let color = "#28a745"; if (cajas < 20) color = "#dc3545"; else if (cajas < 30) color = "#ffc107";
  return `<span style="color:${color}; font-size:14px; letter-spacing:1px;">${barra}</span>`;
}

function scoreFinal(l, c, t, r) { return Math.round((l + c + t + r) / 4); }

function alertasPorFase(c) {
  let a = [];
  if (c.limpieza < 40) a.push("Limpieza crítica");
  if (c.calidad < 60) a.push("Calidad inestable");
  if (c.resistencia < 50) a.push("Resistencia baja");
  if (c.merma > 5) a.push("Merma fuera de rango");
  if (c.cajas < 15) a.push("Rendimiento bajo en cajas");
  return a;
}

function obtenerFasePorDias(d) {
  if (d <= 10) return { fase: "F1", clase: "f1" };
  if (d <= 20) return { fase: "F2", clase: "f2" };
  return { fase: "F3", clase: "f3" };
}

function resumenTrabajador(c, dias, score) {
  return `
    🧹 Limpieza: ${c.limpieza}%  
    🥚 Calidad: ${c.calidad}%  
    💪 Resistencia: ${c.resistencia}%  
    📦 Cajas por día: ${c.cajas}  
    🛠️ Técnica: ${c.tecnica}%  
    ⭐ Score general: ${score}  
    📅 Días en capacitación: ${dias}  
  `;
}

let posicionActual = 0;

function abrirPanel(i) {
  const c = DATA_TRABAJADORES[i];
  const { avance, dias } = calcularAvance(c.inicio);

  document.getElementById("modal").style.display = "flex";
  document.getElementById("modalTitle").innerText = c.nombre;
  document.getElementById("modalInfo").innerHTML = `
    <strong>Avance:</strong> ${avance}%<br>
    <strong>Días en programa:</strong> ${dias}<br>
    <strong>Cajas promedio:</strong> ${c.cajas}<br>
    <strong>Score:</strong> ${scoreFinal(c.limpieza,c.calidad,c.tecnica,c.resistencia)}
  `;

  new Chart(document.getElementById("graf1"), {
    type:"bar",
    data:{ labels:["Cajas"], datasets:[{ data:[c.cajas], backgroundColor:"#28a745" }] },
    options:{ plugins:{ legend:{ display:false } } }
  });

  new Chart(document.getElementById("graf2"), {
    type:"bar",
    data:{ labels:["Limpieza","Calidad","Técnica","Resistencia"], datasets:[{ data:[c.limpieza,c.calidad,c.tecnica,c.resistencia], backgroundColor:"#007bff" }] },
    options:{ plugins:{ legend:{ display:false } } }
  });

  new Chart(document.getElementById("graf3"), {
    type:"bar",
    data:{ labels:["Avance"], datasets:[{ data:[avance], backgroundColor:"#ffc107" }] },
    options:{ plugins:{ legend:{ display:false } } }
  });
}

function cerrarModal() {
  document.getElementById("modal").style.display = "none";
  document.getElementById("graf1").getContext("2d").clearRect(0,0,400,400);
  document.getElementById("graf2").getContext("2d").clearRect(0,0,400,400);
  document.getElementById("graf3").getContext("2d").clearRect(0,0,400,400);
}

function render() {
  const tbody = document.getElementById("tbody");
  DATA_TRABAJADORES.sort((a, b) => calcularAvance(b.inicio).avance - calcularAvance(a.inicio).avance);
  tbody.innerHTML = "";
  DATA_TRABAJADORES.forEach((c,i)=>{
    const { avance, dias } = calcularAvance(c.inicio);
    const score = scoreFinal(c.limpieza,c.calidad,c.tecnica,c.resistencia);
    const alertas = alertasPorFase(c);
    const fase = obtenerFasePorDias(dias);
    const resumen = resumenTrabajador(c, dias, score);
    tbody.innerHTML += `
      <tr onclick="abrirPanel(${i})">
        <td>${i+1}</td>
        <td><strong>${c.nombre}</strong></td>
        <td>⚠️ <span class="tag rojo">${c.merma}%</span></td>
        <td>${barraAvance(avance)}</td>
        <td>${miniGraficoInventario(c.cajas)}</td>
        <td>⭐ <strong>${score}</strong></td>
        <td><span class="fase-tag ${fase.clase}">🏁 ${fase.fase}</span></td>
        <td style="text-align:left; font-size:12px; white-space:pre-line;">${resumen}</td>
        <td>${alertas.map(a=>`<div class="alerta-fase">🔔 ${a}</div>`).join("")}</td>
      </tr>
    `;
  });
}

window.onload = function() {
  render();
};
</script>

</head>

<body>

<h2>📊 Dashboard PRO – Programa de Capacitación</h2>

<table>
  <thead>
    <tr>
      <th>#</th>
      <th>Casetero</th>
      <th>⚠️ Merma</th>
      <th>📊 Avance</th>
      <th>📦 Inventario</th>
      <th>⭐ Score</th>
      <th>🏁 Fase</th>
      <th>📝 Resumen</th>
      <th>🔔 Alertas</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>

<!-- MODAL -->
<div id="modal">
  <div id="modalContent">
    <span id="closeBtn" onclick="cerrarModal()">✖</span>
    <h3 id="modalTitle"></h3>
    <p id="modalInfo"></p>

    <h4>Cajas recolectadas</h4>
    <canvas id="graf1"></canvas>

    <h4>Rendimiento por habilidad</h4>
    <canvas id="graf2"></canvas>

    <h4>Avance del programa</h4>
    <canvas id="graf3"></canvas>
  </div>
</div>

</body>
</html>
