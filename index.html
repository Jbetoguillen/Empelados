<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard PRO – Capacitación AGROVAL</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
  body {
    font-family: 'Segoe UI', Arial;
    background: #eef1f4;
    margin: 0;
    padding: 30px;
  }

  h2 {
    color: #1f2d3d;
    margin-bottom: 25px;
    font-size: 28px;
    font-weight: 700;
    text-align: center;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    background: #fff;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 4px 18px rgba(0,0,0,0.1);
  }

  thead th {
    background: #1f2d3d;
    color: white;
    padding: 12px;
    font-size: 14px;
  }

  td {
    padding: 12px;
    border-bottom: 1px solid #e5e5e5;
    text-align: center;
    font-size: 14px;
  }

  tr:hover {
    background: #f1f7ff;
    cursor: pointer;
  }

  .avance {
    font-weight: bold;
    padding: 6px 10px;
    border-radius: 6px;
    color: white;
  }

  .rojo { background: #dc3545; }
  .amarillo { background: #ffc107; color: #000; }
  .verde { background: #28a745; }

  .fase-tag {
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: bold;
    color: white;
  }

  .f1 { background: #dc3545; }
  .f2 { background: #ffc107; color: #000; }
  .f3 { background: #28a745; }

  #graficaBox {
    margin-top: 40px;
    background: white;
    padding: 25px;
    border-radius: 14px;
    box-shadow: 0 4px 18px rgba(0,0,0,0.1);
    display: none;
  }
</style>

</head>

<body>

<h2>📊 Dashboard PRO – Programa de Capacitación</h2>

<table>
  <thead>
    <tr>
      <th>#</th>
      <th>Casetero</th>
      <th>Avance</th>
      <th>Inventario</th>
      <th>Score</th>
      <th>Fase</th>
      <th>Comentario</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>

<div id="graficaBox">
  <h3 id="tituloGrafica"></h3>
  <canvas id="grafica"></canvas>
</div>

<script>
// ============================
// DATOS 2026 (actualizados)
// ============================
const DATA = [

  // Michel Adriana Castro (base + actualizado)
  { nombre:"Michel Adriana Castro", merma:4, limpieza:60, calidad:80, resistencia:40, tecnica:65, cajas:20, inicio:"2026-03-20" },
  { nombre:"Michel Adriana Castro", merma:2, limpieza:75, calidad:90, resistencia:80, tecnica:80, cajas:40, inicio:"2026-04-01" },

  // María de los Ángeles (BAJA)
  { nombre:"María de los Ángeles Castillo Contreras", merma:3, limpieza:70, calidad:90, resistencia:50, tecnica:70, cajas:28, inicio:"2026-03-31" },

  // Felipe de Jesús (base + actualizado)
  { nombre:"Felipe de Jesús Castillo Escalante", merma:4, limpieza:85, calidad:80, resistencia:50, tecnica:65, cajas:35, inicio:"2026-03-31" },
  { nombre:"Felipe de Jesús Castillo Escalante", merma:2, limpieza:85, calidad:90, resistencia:80, tecnica:80, cajas:39, inicio:"2026-04-01" },

  // Blanca Yaneli (base + actualizada)
  { nombre:"Blanca Yaneli Vega Gutierrez", merma:2, limpieza:75, calidad:90, resistencia:60, tecnica:75, cajas:30, inicio:"2026-04-03" },
  { nombre:"Blanca Yaneli Vega Gutierrez", merma:2, limpieza:70, calidad:90, resistencia:70, tecnica:75, cajas:37, inicio:"2026-04-03" },

  // César Braulio (base + actualizado)
  { nombre:"Cesar Braulio Pereida Monroy", merma:5, limpieza:60, calidad:70, resistencia:60, tecnica:70, cajas:29, inicio:"2026-04-04" },
  { nombre:"Cesar Braulio Pereida Monroy", merma:3, limpieza:75, calidad:90, resistencia:80, tecnica:75, cajas:33, inicio:"2026-04-04" },

  // José Ángel (dos reportes)
  { nombre:"José Ángel González García", merma:6, limpieza:50, calidad:70, resistencia:30, tecnica:55, cajas:15, inicio:"2026-03-28" },
  { nombre:"José Ángel González García", merma:4, limpieza:60, calidad:80, resistencia:40, tecnica:65, cajas:20, inicio:"2026-04-01" },

  // Santos Heriberto (un reporte)
  { nombre:"Santos Heriberto Cornelio Tapia", merma:6, limpieza:60, calidad:70, resistencia:50, tecnica:65, cajas:25, inicio:"2026-04-01" },

  // Miguel Gustavo Jimenez Espinoza
  { nombre:"Miguel Gustavo Jimenez Espinoza", merma:4, limpieza:75, calidad:80, resistencia:70, tecnica:75, cajas:28, inicio:"2026-04-01" },

  // Leydi Lizeth Parra Leyva (actualizada)
  { nombre:"Leydi Lizeth Parra Leyva", merma:2, limpieza:75, calidad:90, resistencia:70, tecnica:75, cajas:22, inicio:"2026-04-10" },

  // Jesús Abel Cervantes Medina (actualizado)
  { nombre:"Jesús Abel Cervantes Medina", merma:2, limpieza:80, calidad:85, resistencia:80, tecnica:80, cajas:23, inicio:"2026-04-10" },

  // Agustín Armando Ayala Vasquez
  { nombre:"Agustín Armando Ayala Vasquez", merma:6, limpieza:60, calidad:70, resistencia:60, tecnica:65, cajas:12, inicio:"2026-04-15" },

  // Aurelia Teresa Ayala Vasquez
  { nombre:"Aurelia Teresa Ayala Vasquez", merma:4, limpieza:60, calidad:80, resistencia:55, tecnica:65, cajas:7, inicio:"2026-04-15" },

  // Adolfa Balvadea Vazquez
  { nombre:"Adolfa Balvadea Vazquez", merma:10, limpieza:60, calidad:75, resistencia:55, tecnica:60, cajas:10, inicio:"2026-04-15" }
];

// ============================
// AGRUPAR REPORTES POR PERSONA
// ============================
function agruparPorPersona() {
  const map = {};
  DATA.forEach(r => {
    if (!map[r.nombre]) map[r.nombre] = [];
    map[r.nombre].push(r);
  });
  return map;
}

// ============================
// DÍAS DESDE FECHA REAL
// ============================
function diasDesdeInicio(fechaInicio) {
  const inicio = new Date(fechaInicio);
  const hoy = new Date();
  let dias = Math.floor((hoy - inicio) / (1000*60*60*24));
  return dias < 0 ? 0 : dias;
}

// ============================
// FASE
// ============================
function faseSegunProtocolo(dias) {
  if (dias <= 10) return "f1";
  if (dias <= 20) return "f2";
  return "f3";
}

// ============================
// COLOR SEGÚN AVANCE
// ============================
function colorAvance(dias) {
  if (dias <= 10) return "rojo";
  if (dias <= 20) return "amarillo";
  return "verde";
}

// ============================
// COMENTARIO AUTOMÁTICO
// ============================
function comentario(primer, ultimo, nombre) {

  if (nombre.includes("María de los Ángeles")) return "BAJA";

  let mejoras = 0;
  let empeoras = 0;

  if (ultimo.limpieza > primer.limpieza) mejoras++; else if (ultimo.limpieza < primer.limpieza) empeoras++;
  if (ultimo.calidad > primer.calidad) mejoras++; else if (ultimo.calidad < primer.calidad) empeoras++;
  if (ultimo.tecnica > primer.tecnica) mejoras++; else if (ultimo.tecnica < primer.tecnica) empeoras++;
  if (ultimo.resistencia > primer.resistencia) mejoras++; else if (ultimo.resistencia < primer.resistencia) empeoras++;
  if (ultimo.merma < primer.merma) mejoras++; else if (ultimo.merma > primer.merma) empeoras++;

  if (mejoras > empeoras) return "Comentario positivo";
  if (empeoras > mejoras) return "Comentario negativo";
  return "Rendimiento detenido";
}

// ============================
// GRÁFICA
// ============================
let chart;

function mostrarGrafica(nombre, primer, ultimo) {

  if (nombre.includes("María de los Ángeles")) return;

  document.getElementById("graficaBox").style.display = "block";
  document.getElementById("tituloGrafica").innerText = "Evolución de " + nombre;

  const labels = ["Limpieza", "Calidad", "Técnica", "Resistencia", "Merma"];
  const primerData = [primer.limpieza, primer.calidad, primer.tecnica, primer.resistencia, primer.merma];
  const ultimoData = [ultimo.limpieza, ultimo.calidad, ultimo.tecnica, ultimo.resistencia, ultimo.merma];

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("grafica"), {
    type: "bar",
    data: {
      labels: labels,
      datasets: [
        { label: "Primer reporte", backgroundColor: "#1f77b4", data: primerData },
        { label: "Último reporte", backgroundColor: "#ff7f0e", data: ultimoData }
      ]
    },
    options: { responsive: true, scales: { y: { beginAtZero: true } } }
  });
}

// ============================
// RENDER (ORDENADO + SEPARADO)
// ============================
function render() {
  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";

  const personas = agruparPorPersona();
  let activos = [];
  let bajas = [];

  Object.keys(personas).forEach(nombre => {
    const reportes = personas[nombre];
    const primer = reportes[0];
    const ultimo = reportes[reportes.length - 1];
    const dias = diasDesdeInicio(primer.inicio);

    const registro = {
      nombre,
      primer,
      ultimo,
      dias,
      fase: faseSegunProtocolo(dias),
      color: colorAvance(dias),
      comentario: comentario(primer, ultimo, nombre)
    };

    if (registro.comentario === "BAJA") bajas.push(registro);
    else activos.push(registro);
  });

  // ORDENAR ACTIVOS POR DÍAS (MAYOR → MENOR)
  activos.sort((a, b) => b.dias - a.dias);

  // ORDENAR BAJAS TAMBIÉN
  bajas.sort((a, b) => b.dias - a.dias);

  // ============================
  // IMPRIMIR ACTIVOS
  // ============================
  tbody.innerHTML += `
    <tr style="background:#d4edda;">
      <td colspan="7"><strong>🟩 PERSONAL ACTIVO</strong></td>
    </tr>
  `;

  activos.forEach((p, i) => {
    tbody.innerHTML += `
      <tr onclick='mostrarGrafica("${p.nombre}", ${JSON.stringify(p.primer)}, ${JSON.stringify(p.ultimo)})'>
        <td>${i+1}</td>
        <td><strong>${p.nombre}</strong></td>
        <td><span class="avance ${p.color}">${p.dias} días</span></td>
        <td>📦 ${p.ultimo.cajas}</td>
        <td>⭐ ${Math.round((p.ultimo.limpieza+p.ultimo.calidad+p.ultimo.tecnica+p.ultimo.resistencia)/4)}</td>
        <td><span class="fase-tag ${p.fase}">${p.fase.toUpperCase()}</span></td>
        <td>${p.comentario}</td>
      </tr>
    `;
  });

  // ============================
  // IMPRIMIR BAJA
  // ============================
  tbody.innerHTML += `
    <tr style="background:#f8d7da;">
      <td colspan="7"><strong>🟥 PERSONAL DE BAJA</strong></td>
    </tr>
  `;

  bajas.forEach((p, i) => {
    tbody.innerHTML += `
      <tr style="opacity:0.6;">
        <td>${i+1}</td>
        <td><strong>${p.nombre}</strong></td>
        <td><span class="avance rojo">${p.dias} días</span></td>
        <td>📦 ${p.ultimo.cajas}</td>
        <td>⭐ ${Math.round((p.ultimo.limpieza+p.ultimo.calidad+p.ultimo.tecnica+p.ultimo.resistencia)/4)}</td>
        <td><span class="fase-tag f1">F1</span></td>
        <td>BAJA</td>
      </tr>
    `;
  });
}

window.onload = render;
</script>

</body>
</html>
