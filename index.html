<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard PRO – Programa de Capacitación</title>

<style>
  body { font-family:'Segoe UI', Arial; background:#eef1f4; margin:0; padding:20px; }
  h2 { color:#2d3e50; margin-bottom:20px; }
  table { width:100%; border-collapse:collapse; background:#fff; border-radius:12px; margin-top:20px; display:block; max-height:75vh; overflow-y:auto; }
  thead th { position: sticky; top: 0; background:#1f2d3d; color:white; z-index: 50; padding:10px; font-size:13px; }
  td { padding:10px; border-bottom:1px solid #ddd; text-align:center; vertical-align:middle; cursor:pointer; }

  .tag { padding:4px 8px; border-radius:10px; font-size:11px; font-weight:bold; color:#fff; }
  .rojo { background:#dc3545; }
  .amarillo { background:#ffc107; color:#000; }
  .verde { background:#28a745; }

  .fase-tag { padding:4px 8px; border-radius:6px; font-size:11px; font-weight:bold; color:white; display:inline-block; }
  .f1 { background:#dc3545; }
  .f2 { background:#ffc107; color:#000; }
  .f3 { background:#28a745; }

  /* MODAL */
  #modal {
    position:fixed; top:0; left:0; width:100%; height:100%;
    background:rgba(0,0,0,0.6); display:none; justify-content:center; align-items:center;
    padding:20px;
  }
  #modalContent {
    background:white; width:80%; max-height:90vh; padding:20px; border-radius:12px;
    overflow-y:auto;
  }
  #closeBtn {
    float:right; cursor:pointer; font-size:20px; font-weight:bold;
  }

  .graf-container {
    width:100%;
    max-width:600px;
    margin:auto;
    margin-bottom:30px;
  }

  #exportBtn {
    background:#28a745; color:white; padding:10px 16px; border:none; border-radius:6px;
    cursor:pointer; margin-bottom:20px;
  }
</style>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
const DATA_TRABAJADORES = [
  { nombre:"Michel Adriana Castro", merma:2, limpieza:70, calidad:90, resistencia:60, tecnica:75, cajas:34, inicio:"2026-03-31" },
  { nombre:"María de los Ángeles Castillo Contreras", merma:3, limpieza:70, calidad:90, resistencia:50, tecnica:70, cajas:28, inicio:"2026-03-31" },
  { nombre:"Felipe de Jesús Castillo Escalante", merma:4, limpieza:85, calidad:80, resistencia:50, tecnica:65, cajas:35, inicio:"2026-03-31" },
  { nombre:"Blanca Yaneli Vega Gutierrez", merma:2, limpieza:75, calidad:90, resistencia:60, tecnica:75, cajas:30, inicio:"2026-04-03" },
  { nombre:"Cesar Braulio Pereida Monroy", merma:5, limpieza:60, calidad:70, resistencia:60, tecnica:70, cajas:29, inicio:"2026-04-04" },
  { nombre:"José Ángel González García", merma:4, limpieza:60, calidad:80, resistencia:40, tecnica:65, cajas:20, inicio:"2026-04-01" },
  { nombre:"Santos Heriberto Cornelio Tapia", merma:6, limpieza:60, calidad:70, resistencia:50, tecnica:65, cajas:25, inicio:"2026-04-01" }
];

function calcularAvance(inicio) {
  const start = new Date(inicio);
  const hoy = new Date("2026-04-06");
  const diff = Math.floor((hoy - start) / (1000*60*60*24));
  const avance = Math.min(Math.max(Math.round((diff/33)*100), 0), 100);
  return { avance, dias: diff };
}

function resumenPersona(c) {
  let r = [];
  if (c.limpieza >= 70) r.push("ordenada");
  else r.push("limpieza aceptable");

  if (c.calidad >= 80) r.push("buena calidad");
  else r.push("calidad variable");

  if (c.resistencia >= 60) r.push("resistencia adecuada");
  else r.push("resistencia baja");

  if (c.tecnica >= 70) r.push("técnica sólida");
  else r.push("técnica en desarrollo");

  if (c.merma > 5) r.push("merma alta");
  else r.push("merma controlada");

  return r.join(", ");
}

let chart1, chart2, chart3;

function abrirPanel(i) {
  const c = DATA_TRABAJADORES[i];
  const { avance, dias } = calcularAvance(c.inicio);

  document.getElementById("modal").style.display = "flex";
  document.getElementById("modalTitle").innerText = c.nombre;
  document.getElementById("modalInfo").innerHTML = `
    <strong>Fase:</strong> ${dias <= 10 ? "F1" : dias <= 20 ? "F2" : "F3"}<br>
    <strong>Avance:</strong> ${avance}%<br>
    <strong>Días en programa:</strong> ${dias}<br>
    <strong>Cajas promedio:</strong> ${c.cajas}<br>
    <strong>Score:</strong> ${Math.round((c.limpieza+c.calidad+c.tecnica+c.resistencia)/4)}<br>
    <strong>Resumen:</strong> ${resumenPersona(c)}
  `;

  if (chart1) chart1.destroy();
  if (chart2) chart2.destroy();
  if (chart3) chart3.destroy();

  chart1 = new Chart(document.getElementById("graf1"), {
    type:"bar",
    data:{ labels:["Cajas"], datasets:[{ data:[c.cajas], backgroundColor:"#28a745" }] },
    options:{ responsive:true, maintainAspectRatio:false }
  });

  chart2 = new Chart(document.getElementById("graf2"), {
    type:"bar",
    data:{ labels:["Limpieza","Calidad","Técnica","Resistencia"], datasets:[{ data:[c.limpieza,c.calidad,c.tecnica,c.resistencia], backgroundColor:"#007bff" }] },
    options:{ responsive:true, maintainAspectRatio:false }
  });

  const tendencia = [
    Math.round(c.limpieza * 0.8),
    Math.round(c.calidad * 0.85),
    Math.round(c.tecnica * 0.9),
    Math.round(c.resistencia * 0.95),
    c.limpieza
  ];

  chart3 = new Chart(document.getElementById("graf3"), {
    type:"line",
    data:{
      labels:["Semana 1","Semana 2","Semana 3","Semana 4","Hoy"],
      datasets:[{
        label:"Tendencia de rendimiento",
        data:tendencia,
        borderColor:"#ff5733",
        backgroundColor:"rgba(255,87,51,0.2)",
        tension:0.3
      }]
    },
    options:{ responsive:true, maintainAspectRatio:false }
  });
}

async function exportarPDF() {
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF("p","mm","a4");

  const modal = document.getElementById("modalContent");
  const canvas = await html2canvas(modal, { scale:2 });
  const img = canvas.toDataURL("image/png");

  pdf.addImage(img, "PNG", 5, 5, 200, 0);
  pdf.save("reporte_casetero.pdf");
}

function cerrarModal() {
  document.getElementById("modal").style.display = "none";
}

function render() {
  const tbody = document.getElementById("tbody");
  DATA_TRABAJADORES.sort((a, b) => calcularAvance(b.inicio).avance - calcularAvance(a.inicio).avance);
  tbody.innerHTML = "";
  DATA_TRABAJADORES.forEach((c,i)=>{
    const { avance } = calcularAvance(c.inicio);
    tbody.innerHTML += `
      <tr onclick="abrirPanel(${i})">
        <td>${i+1}</td>
        <td><strong>${c.nombre}</strong></td>
        <td>⚠️ <span class="tag rojo">${c.merma}%</span></td>
        <td>${barraAvance(avance)}</td>
        <td>📦 ${c.cajas}</td>
        <td>⭐ ${Math.round((c.limpieza+c.calidad+c.tecnica+c.resistencia)/4)}</td>
        <td><span class="fase-tag">${avance < 30 ? "F1" : avance < 60 ? "F2" : "F3"}</span></td>
        <td>${resumenPersona(c)}</td>
      </tr>
    `;
  });
}

window.onload = render;
</script>

</head>

<body>

<h2>📊 Dashboard PRO – Programa de Capacitación</h2>

<table>
  <thead>
    <tr>
      <th>#</th>
      <th>Casetero</th>
      <th>⚠️ Merma</th>
      <th>📊 Avance</th>
      <th>📦 Inventario</th>
      <th>⭐ Score</th>
      <th>🏁 Fase</th>
      <th>🔔 Perfil</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>

<!-- MODAL -->
<div id="modal">
  <div id="modalContent">
    <span id="closeBtn" onclick="cerrarModal()">✖</span>
    <h3 id="modalTitle"></h3>
    <p id="modalInfo"></p>

    <button id="exportBtn" onclick="exportarPDF()">📄 Exportar PDF</button>

    <div class="graf-container" style="height:250px;">
      <h4>Cajas recolectadas</h4>
      <canvas id="graf1"></canvas>
    </div>

    <div class="graf-container" style="height:250px;">
      <h4>Rendimiento por habilidad</h4>
      <canvas id="graf2"></canvas>
    </div>

    <div class="graf-container" style="height:250px;">
      <h4>Tendencia de rendimiento</h4>
      <canvas id="graf3"></canvas>
    </div>

  </div>
</div>

</body>
</html>
